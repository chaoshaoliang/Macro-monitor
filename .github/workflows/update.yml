name: Daily Macro Data Update

on:
  schedule:
    - cron: '25 22 * * *' #更改為台灣時間早上6:25
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance google-genai beautifulsoup4

    - name: Run Data Update Script
      id: macro_run
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        python scripts/update_data.py

    # 發送 Email 通知至 yutaker@gmail.com (僅在非正常狀態時觸發)
     
    - name: Send Email Notification
      if: env.STATUS_CHANGED == 'true'    # <=== 新增這一行在這邊！
     # if: steps.macro_run.outputs.is_alert == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: yutaker@gmail.com
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: 🔴 總經投資風險告警 - 狀態：${{ steps.macro_run.outputs.status }}
        to: yutaker@gmail.com
        from: Macro Monitor AI
        body: |
          您好，系統偵測到當前總經指標異動。
          
          當前狀態：${{ steps.macro_run.outputs.status }}
          詳細 AI 診斷報告與建議配置，請參閱您的自動化看板網頁。

    - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Auto-update data and check alerts"
        file_pattern: "data/*.json"
